<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecast App</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="intro">
      <div class="intro__media"></div>
    </div>
    <header class="header">
      <div class="header__media">
        <video
          class="header__video"
          src="./video/raining.mp4"
          autoplay
          muted
          loop
        ></video>
      </div>
      <div class="container">
        <div class="header__inner">
          <form class="geo-form">
            <select class="cities">
              <option selected>Выберите город</option>
            </select>
            <input
              type="number"
              class="geo-form__input geo-form__input--latitude"
              placeholder="Введите широту"
            />
            <input
              type="number"
              class="geo-form__input geo-form__input--longitude"
              placeholder="Введите долготу"
            />
            <input
              type="number"
              class="geo-form__input geo-form__input--cities"
              placeholder="Введите количество городов"
            />
            <button class="geo-form__btn geo-form__btn--add" type="button">
              Отправить
            </button>
            <button class="geo-form__btn geo-form__btn--delete" type="button">
              Очистить список
            </button>
          </form>
          <div class="header__content">
            <article class="weather-card">
              <h3 class="weather-card__city">город</h3>
              <span class="weather-card__degrees">градусы</span>
              <span class="weather-card__feelslike">Чувствуется как:</span>
              <span class="weather-card__clouds">облачно с прояснениями</span>
              <span class="weather-card__humidity">влажность</span>
            </article>
          </div>
        </div>
      </div>
    </header>

    <script src="./js/script.js"></script>
  </body>
</html>
